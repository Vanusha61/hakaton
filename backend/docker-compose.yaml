services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yearreporter-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:8080/api/v1/progress/quarter?quarter=1&user_id=665767&course_id=755' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: yearreporter-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 120s
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
