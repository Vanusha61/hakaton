services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yearreporter-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:8080/api/v1/progress/quarter?quarter=1&user_id=665767&course_id=755' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:18
    container_name: yearreporter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xakaton
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./dump-xakaton-202603310120.sql:/backups/dump-xakaton-202603310120.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xakaton"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
